
# Upstream para MinIO
upstream minio-server {
    server minio:9000;
}

upstream minio-console {
    server minio:9001;
}

# Upstream para Grafana
upstream grafana-server {
    server grafana:3000;
}

# Upstream para Prometheus
upstream prometheus-server {
    server prometheus:9090;
}

# Upstream para Keycloak
upstream keycloak-server {
    server keycloak:8080;
}

# Map para extrair porta do Host header, se presente
map $http_host $x_forwarded_port {
    default $server_port;
    ~^(?<h>[^:]+):(?<p>\d+)$ $p;
}

map $http_host $x_forwarded_host {
    default $host;
    ~^(?<h>[^:]+):(?<p>\d+)$ $host:$p;
}


server {
    listen 443 ssl;
    server_name _;

    client_max_body_size 10M;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Public website
    location / {
        proxy_pass http://public-website/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $x_forwarded_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Keycloak
    location /auth/ {
        proxy_pass http://keycloak:8080/auth/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $x_forwarded_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $x_forwarded_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin panel
    location /admin/ {
        proxy_pass http://admin-panel/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_buffering off;
    }

    # Admin API
    location /api/admin/ {
        proxy_pass http://competition-api-v3:8000/api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public API
    location /api/public/ {
        proxy_pass http://public-api:8000/api/public/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MinIO - Proxy para arquivos públicos
    location /files/ {
        proxy_pass http://minio-server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Headers CORS
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type" always;

        # Desabilitar buffering para streaming de arquivos grandes
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeouts maiores para upload/download de arquivos grandes
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    location /system/grafana/ {
        proxy_pass http://grafana:3000/system/grafana/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /system/minio/ {
        proxy_pass http://minio:9001/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name _;

    # Redireciona todo o tráfego HTTP para HTTPS
    return 301 https://$host$request_uri;
}
