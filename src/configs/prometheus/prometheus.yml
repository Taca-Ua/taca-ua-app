global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'competition-api-v3'
    static_configs:
      - targets: ['competition-api-v3:8000']

  - job_name: 'public-api'
    static_configs:
      - targets: ['public-api:8000']

  - job_name: 'read-model-updater'
    static_configs:
      - targets: ['read-model-updater:8000']
