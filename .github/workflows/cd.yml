name: CD - Deploy to Production

on:
  push:
    branches:
      - feat/ci-cd

jobs:
  build-and-push:
    name: Build and Push - ${{ matrix.service.name }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service:
          # - { path: src/apis/competition-api-v2, name: competition-api }
          # - { path: src/microservices/matches-service, name: matches-service }
          # - { path: src/microservices/modalities-service, name: modalities-service } 
          # - { path: src/microservices/ranking-service, name: ranking-service }
          # - { path: src/microservices/read-model-updater, name: read-model-updater }
          # - { path: src/microservices/tournaments-service, name: tournaments-service }
          #- { path: src/apis/public-api, name: public-api }
          - { path: src/configs/nginx, name: nginx }
          - { path: src/frontend/admin-panel, name: admin-panel }   # NOVO
          - { path: src/frontend/public-website, name: public-website } # NOVO

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taca-ua-${{ matrix.service.name }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/taca-ua-${{ matrix.service.name }}:stable
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

  deploy:
    name: Deploy - ${{ matrix.service.name }}
    needs: build-and-push
    runs-on: self-hosted
    strategy:
      matrix:
        # Repetimos a matrix aqui para que cada build dispare o seu próprio deploy
        service:
          # - { name: competition-api }
          # - { name: matches-service }
          # - { name: modalities-service } 
          # - { name: ranking-service }
          # - { name: read-model-updater }
          # - { name: tournaments-service }
          #- { name: public-api }
          - { name: nginx }
          - { name: admin-panel }
          - { name: public-website }
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Local Docker Compose Deploy
        run: |
          cd $GITHUB_WORKSPACE

          # 1. Preparar o ambiente
          if [ -f "$HOME/.env" ]; then
            cp "$HOME/.env" .env
          else
            echo "ERRO: Ficheiro .env não encontrado em $HOME"
            exit 1
          fi
          
          # 2. Puxar a imagem específica deste serviço da matrix
          # Usamos o nome que está no docker-compose.yml
          docker compose pull ${{ matrix.service.name }}
          
          # 3. Atualizar o serviço específico
          # O Docker Compose vai verificar se a imagem mudou e reiniciar apenas este container
          # Mantemos o 'minio' e 'redis' no 'up' para garantir que a infra base está sempre ligada
          docker compose up -d ${{ matrix.service.name }} minio redis rabbitmq postgres keycloak grafana prometheus loki
          
          # 4. Limpeza
          docker image prune -f