name: CD - Deploy to Production

on:
  push:
    branches:
      - feat/ci-cd

jobs:
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-24.04 
    strategy:
      matrix:
        service:
          - { path: src/apis/competition-api-v2, name: competition-api-v2 }
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taca-ua-${{ matrix.service.name }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/taca-ua-${{ matrix.service.name }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Update VM via SSH
    needs: build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Diagnostico de Rede
        run: |
          echo "Testando resolucao de DNS..."
          nslookup mednat.ieeta.pt || echo "DNS falhou"
          echo "Testando porta 8970..."
          nc -zv -w5 mednat.ieeta.pt 8970 || echo "Porta fechada ou inacessivel"

      - name: Deploy to VM
        uses: appleboy/ssh-action@master
        with:
          host: mednat.ieeta.pt
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            cd /home/mateusrocha/app
            # Atualiza info do deploy
            echo "DEPLOY_SHA=${{ github.sha }}" > .deploy_info
            # Puxa imagens e sobe containers
            docker compose pull
            docker compose up -d --remove-orphans