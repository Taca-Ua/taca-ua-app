name: CD - Deploy to Production

on:
  push:
    branches:
      - feat/ci-cd

jobs:
  build-and-push:
    name: Build and Push - ${{ matrix.service.name }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        service:
          - { path: src/apis/competition-api-v2, name: competition-api-v2 }
          - { path: src/microservices/matches-service, name: matches-service }
          - { path: src/microservices/modalities-service, name: modalities-service } 
          - { path: src/microservices/ranking-service, name: ranking-service }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taca-ua-${{ matrix.service.name }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/taca-ua-${{ matrix.service.name }}:stable
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Local Docker Compose Deploy
        run: |
          cd $GITHUB_WORKSPACE

          # 1. Preparar o ambiente com o .env da sua HOME
          if [ -f "$HOME/.env" ]; then
            cp "$HOME/.env" .env
            echo ".env copiado com sucesso."
          else
            echo "ERRO: Ficheiro .env não encontrado em $HOME"
            exit 1
          fi
          
          # 2. Puxar apenas a imagem que acabou de ser buildada
          # Nota: O nome 'competition-api' deve ser o nome do serviço no seu docker-compose.yml
          docker compose pull competition-api
          
          # 3. Subir APENAS a competition-api e suas dependências diretas (DB, Rabbit)
          # Usamos o nome do serviço definido no docker-compose.yml
          docker compose up -d competition-api
          
          # 4. Limpeza de imagens antigas
          docker image prune -f