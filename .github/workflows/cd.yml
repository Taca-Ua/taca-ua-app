name: CD - Deploy to Production

on:
  push:
    branches:
      - feat/ci-cd

jobs:
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-24.04 
    strategy:
      matrix:
        service:
          - { path: src/apis/public-api, name: public-api }
          - { path: src/apis/competition-api-v2/competition_api_v2, name: competition-api-v2 }
          - { path: src/microservices/matches-service, name: matches-service }
          - { path: src/microservices/modalities-service, name: modalities-service }
          - { path: src/microservices/ranking-service, name: ranking-service }
          - { path: src/microservices/read-model-updater, name: read-model-updater }
          - { path: src/microservices/tournaments-service, name: tournaments-service }
          - { path: src/frontend/admin-panel, name: admin-panel }
          - { path: src/frontend/public-website, name: public-website }
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taca-ua-${{ matrix.service.name }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/taca-ua-${{ matrix.service.name }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Update VM via SSH
    needs: build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            cd /home/mateusrocha/app
            # Regista qual o SHA que está atualmente em produção
            echo "DEPLOY_SHA=${{ github.sha }}" > .deploy_info
            # Puxa as novas imagens (tag stable) do Docker Hub
            docker compose pull
            # Reinicia apenas os containers que sofreram alterações
            docker compose up -d --remove-orphans