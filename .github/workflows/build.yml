name: Build and Push Docker Images

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          # Infrastructure
          - service: nginx
            dockerfile: ./src/infrastructure/nginx/Dockerfile

          # APIs
          - service: competition-api-v2
            dockerfile: ./src/apis/competition-api-v2/Dockerfile.dev

          - service: public-api
            dockerfile: ./src/apis/public-api/Dockerfile.dev

          # Microservices
          - service: matches-service
            dockerfile: ./src/microservices/matches-service/Dockerfile.dev

          - service: modalities-service
            dockerfile: ./src/microservices/modalities-service/Dockerfile.dev

          - service: ranking-service
            dockerfile: ./src/microservices/ranking-service/Dockerfile.dev

          - service: read-model-updater
            dockerfile: ./src/microservices/read-model-updater/Dockerfile.dev

          - service: tournaments-service
            dockerfile: ./src/microservices/tournaments-service/Dockerfile.dev

          # Frontend
          - service: admin-panel
            context: src/frontend/admin-panel
            dockerfile: src/frontend/admin-panel/Dockerfile

          - service: public-website
            context: src/frontend/public-website
            dockerfile: src/frontend/public-website/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert owner to lowercase
        run: echo "OWNER_LOWER=$(echo ${{ env.OWNER }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/${{ matrix.service }}:buildcache,mode=max

  notify:
    needs: build-matrix
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify deployment ready
        run: |
          if [ "${{ needs.build-matrix.result }}" == "success" ]; then
            echo "✅ All Docker images built and pushed successfully!"
            echo "Images are available at: ${{ env.REGISTRY }}/${{ env.OWNER }}/*:${{ github.sha }}"
          else
            echo "❌ Build failed!"
            exit 1
          fi
