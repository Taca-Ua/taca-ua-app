name: Build Docker Images Matrix

description: |
  Reusable workflow to build Docker images for all services using a matrix.

on:
  workflow_call:
    inputs:
      push:
        required: true
        type: boolean
    outputs:
      matrix-result:
        description: "Result of the build matrix"
        value: ${{ jobs.build-matrix.result }}

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          # Infrastructure
          - service: nginx-dev
            context: ./src/configs/nginx/dev

          - service: nginx
            context: ./src/configs/nginx/prod

          # APIs
          - service: competition-api-v3
            dockerfile: ./src/apis/competition-api-v3/Dockerfile

          - service: public-api
            dockerfile: ./src/apis/public-api/Dockerfile

          # Frontend
          - service: admin-panel
            context: src/frontend/admin-panel
            dockerfile: src/frontend/admin-panel/Dockerfile

          - service: public-website
            context: src/frontend/public-website
            dockerfile: src/frontend/public-website/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert owner to lowercase
        run: echo "OWNER_LOWER=$(echo ${{ env.OWNER }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          push: ${{ inputs.push && matrix.service != 'nginx-dev' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/${{ matrix.service }}:buildcache,mode=max
