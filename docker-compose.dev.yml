services:
# Infrastructure Services
  nginx:
    build:
      context: ./src/configs/nginx/dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src/configs/nginx/dev/nginx.http.conf:/etc/nginx/conf.d/default.conf
      - ./src/configs/nginx/dev/certs:/etc/nginx/certs
    depends_on:
      - competition-api-v3
      - public-api
      - admin-panel
      - public-website
      - keycloak
      - minio
      - grafana

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: taca_ua
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_EXPOSED_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-user}", "-d", "taca_ua"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8-alpine

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://${DOMAIN:-localhost}/system/minio/
    ports:
      - "9000:9000"
      - "9001:9001"

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.2
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"

      KC_HTTP_RELATIVE_PATH: "/auth"
    volumes:
      - ./src/configs/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./src/configs/keycloak/themes:/opt/keycloak/themes:ro
    command: start-dev --import-realm
    healthcheck:
      test: ["CMD-SHELL", "timeout 10s bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

# Observability
  prometheus:
    image: prom/prometheus:v2.45.0
    volumes:
      - ./src/configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  loki:
    image: grafana/loki:2.8.2
    volumes:
      - ./src/configs/loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:10.0.0
    volumes:
      - ./src/configs/grafana/provisioning:/etc/grafana/provisioning
      - ./src/configs/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_DOMAIN=${DOMAIN:-localhost}
      - GF_SERVER_ROOT_URL=https://${DOMAIN:-localhost}/system/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus
      - loki

# APIs
  competition-api-v3:
    build:
      context: .
      dockerfile: src/apis/competition-api-v3/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/apis/competition-api-v3:/app
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - API_ENDPOINT_PREFIX=${API_ENDPOINT_PREFIX:-api/admin}
      - DEFAULT_SEASON_NAME=${DEFAULT_SEASON_NAME:-Default Season}
      - DEBUG=true

      - LOKI_LOGGING_URL=${LOKI_LOGGING_URL:-http://loki:3100/loki/api/v1/push}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      - POSTGRES_DB=${POSTGRES_DB:-taca_ua}
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

      - MINIO_SERVICE_URL=minio:9000
      - MINIO_USER=${MINIO_ROOT_USER}
      - MINIO_PASSWORD=${MINIO_ROOT_PASSWORD}

      - KEYCLOAK_ADMIN_SERVER_URL=http://keycloak:8080/auth
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-taca-ua}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-admin-api}
      - KEYCLOAK_ADMIN_USERNAME=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}

      - DEV_AUTH_BYPASS_ENABLED=${DEV_AUTH_BYPASS_ENABLED:-true}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/${API_ENDPOINT_PREFIX:-api/admin}/health/ || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s
    depends_on:
      loki:
        condition: service_started
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_healthy

  competition-api-v3-rankings-recomputation-worker:
    build:
      context: .
      dockerfile: src/apis/competition-api-v3/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/apis/competition-api-v3:/app
    environment:
      - LOKI_LOGGING_URL=${LOKI_LOGGING_URL:-http://loki:3100/loki/api/v1/push}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=true

      - POSTGRES_DB=${POSTGRES_DB:-taca_ua}
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

    command: python manage.py rankings_recomputation_worker --settings=config.settings_worker_ranking_updater
    depends_on:
      competition-api-v3:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

  competition-api-v3-projections-updater-worker:
    build:
      context: .
      dockerfile: src/apis/competition-api-v3/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/apis/competition-api-v3:/app
    environment:
      - LOKI_LOGGING_URL=${LOKI_LOGGING_URL:-http://loki:3100/loki/api/v1/push}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=true

      - POSTGRES_DB=${POSTGRES_DB:-taca_ua}
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

    command: python manage.py projection_updater_worker --settings=config.settings_worker_projections_updater
    depends_on:
      competition-api-v3:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

  competition-api-v3-matches-state-updater-worker:
    build:
      context: .
      dockerfile: src/apis/competition-api-v3/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/apis/competition-api-v3:/app
    environment:
      - LOKI_LOGGING_URL=${LOKI_LOGGING_URL:-http://loki:3100/loki/api/v1/push}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=true

      - POSTGRES_DB=${POSTGRES_DB:-taca_ua}
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

    command: python manage.py matches_state_updater_worker --settings=config.settings_worker_matches_state_updater
    depends_on:
      competition-api-v3:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

  public-api:
    build:
      context: .
      dockerfile: src/apis/public-api/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/apis/public-api:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@postgres:5432/taca_ua}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - CACHE_ENABLED=false
    depends_on:
      loki:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

# Frontend Services
  admin-panel:
    build:
      context: .
      dockerfile: src/frontend/admin-panel/Dockerfile.dev
    volumes:
      - ./src/frontend/admin-panel:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_KEYCLOAK_URL=/auth
      - VITE_KEYCLOAK_REALM=${KEYCLOAK_REALM:-taca-ua}
      - VITE_KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-frontend-admin}

  public-website:
    build:
      context: .
      dockerfile: src/frontend/public-website/Dockerfile.dev
    volumes:
      - ./src/frontend/public-website:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true


volumes:
  postgres_data:
