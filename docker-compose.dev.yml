services:
# Infrastructure Services
  nginx:
    build:
      context: ./src/configs/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src/configs/nginx/nginx.http.conf:/etc/nginx/conf.d/default.conf
      - ./src/configs/nginx/certs:/etc/nginx/certs
    depends_on:
      - competition-api-v2
      - public-api
      - admin-panel
      - public-website
      - keycloak
      - minio
      - grafana

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    user: "root"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secret_cookie_change_me}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: taca_ua
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXPOSED_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-user}", "-d", "taca_ua"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://${DOMAIN:-localhost}/system/minio/
    ports:
      - "9000:9000"
      - "9001:9001"

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.2
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"

      KC_HTTP_RELATIVE_PATH: "/auth"
    volumes:
      - ./src/configs/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./src/configs/keycloak/themes:/opt/keycloak/themes:ro
    command: start-dev --import-realm
    healthcheck:
      test: ["CMD-SHELL", "timeout 10s bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

# Observability
  prometheus:
    image: prom/prometheus:v2.45.0
    volumes:
      - ./src/configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.route-prefix=/system/prometheus/'

  loki:
    image: grafana/loki:2.8.2
    volumes:
      - ./src/configs/loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:10.0.0
    volumes:
      - ./src/configs/grafana/provisioning:/etc/grafana/provisioning
      - ./src/configs/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_DOMAIN=${DOMAIN:-localhost}
      - GF_SERVER_ROOT_URL=https://${DOMAIN:-localhost}/system/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus
      - loki

# APIs
  competition-api-v2:
    build:
      context: .
      dockerfile: src/apis/competition-api-v2/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/apis/competition-api-v2:/app
    environment:
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080/auth
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-taca-ua}
      - KEYCLOAK_ISSUER=https://${DOMAIN:-localhost}/auth/realms/${KEYCLOAK_REALM:-taca-ua}
      - MINIO_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - DEV_AUTH_BYPASS_ENABLED=${DEV_AUTH_BYPASS_ENABLED:-true}
      - DEV_AUTH_BYPASS_ROLES=${DEV_AUTH_BYPASS_ROLES:-general_admin}
      - DEV_AUTH_BYPASS_TOKEN=${DEV_AUTH_BYPASS_TOKEN:-}
      - DEV_MODE=true  # Set this to "false" in production to enable issuer validation and other security checks
    depends_on:
      loki:
        condition: service_started
      minio:
        condition: service_started
      keycloak:
        condition: service_started

  public-api:
    build:
      context: .
      dockerfile: src/apis/public-api/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/apis/public-api:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - CACHE_ENABLED=false
    depends_on:
      loki:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

# Microservices
  matches-service:
    build:
      context: .
      dockerfile: src/microservices/matches-service/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/microservices/matches-service:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8001:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

  modalities-service:
    build:
      context: .
      dockerfile: src/microservices/modalities-service/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/microservices/modalities-service:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8002:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

  ranking-service:
    build:
      context: .
      dockerfile: src/microservices/ranking-service/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/microservices/ranking-service:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8003:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

  read-model-updater:
    build:
      context: .
      dockerfile: src/microservices/read-model-updater/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/microservices/read-model-updater:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8004:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

  tournaments-service:
    build:
      context: .
      dockerfile: src/microservices/tournaments-service/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/microservices/tournaments-service:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8005:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

# Frontend Services
  admin-panel:
    build:
      context: .
      dockerfile: src/frontend/admin-panel/Dockerfile.dev
    volumes:
      - ./src/frontend/admin-panel:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_KEYCLOAK_URL=/auth
      - VITE_KEYCLOAK_REALM=${KEYCLOAK_REALM:-taca-ua}
      - VITE_KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-frontend-admin}
    # depends_on:
    #   keycloak:
    #     condition: service_healthy

  public-website:
    build:
      context: .
      dockerfile: src/frontend/public-website/Dockerfile.dev
    volumes:
      - ./src/frontend/public-website:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true


volumes:
  postgres_data:
  minio_data:
  rabbitmq_data:
