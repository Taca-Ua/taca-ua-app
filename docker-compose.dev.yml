services:
# Infrastructure Services
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./src/configs/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - competition-api
      - public-api
      - admin-panel
      - public-website
      - grafana
      - keycloak
      - minio
      - prometheus
      - loki

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    user: "root"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secret_cookie_change_me}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: taca_ua
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-user}", "-d", "taca_ua"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /keycloak
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    volumes:
      - ./src/configs/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/keycloak/health/ready"]
    #   interval: 15s
    #   timeout: 10s
    #   retries: 10
    #   start_period: 60s

# Observability
  prometheus:
    image: prom/prometheus:v2.45.0
    volumes:
      - ./src/configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  loki:
    image: grafana/loki:2.8.2
    volumes:
      - ./src/configs/loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:10.0.0
    volumes:
      - ./src/configs/grafana/provisioning:/etc/grafana/provisioning
      - ./src/configs/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki

# APIs
  competition-api:
    build:
      context: .
      dockerfile: src/apis/competiotion-api/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/apis/competiotion-api:/app
    environment:
      - DJANGO_AUTORELOAD_EXTRA_DIRS=/tmp/taca-messaging
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - POSTGRES_DB=taca_ua
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONUNBUFFERED=1
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost/files
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_USE_SSL=false
      # Keycloak — internal Docker network (JWKS fetch, no nginx hop)
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080/keycloak
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-taca-ua}
      # Issuer must match the ``iss`` claim in tokens, which Keycloak stamps
      # using the public URL seen by the browser (through nginx).
      - KEYCLOAK_ISSUER=http://localhost/keycloak/realms/${KEYCLOAK_REALM:-taca-ua}
      # Optional: uncomment to enforce audience (``aud``) verification.
      # - KEYCLOAK_AUDIENCE=competition-api-gateway
      # Dev auth bypass — set to "true" to skip Keycloak JWT validation.
      # Send header  X-Dev-Auth-Token: <DEV_AUTH_BYPASS_TOKEN>  to authenticate.
      - DEV_AUTH_BYPASS_ENABLED=${DEV_AUTH_BYPASS_ENABLED:-false}
      - DEV_AUTH_BYPASS_TOKEN=${DEV_AUTH_BYPASS_TOKEN:-}
      - DEV_AUTH_BYPASS_ROLES=${DEV_AUTH_BYPASS_ROLES:-general_admin}
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started

  public-api:
    build:
      context: .
      dockerfile: src/apis/public-api/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/apis/public-api:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

# Microservices
  matches-service:
    build:
      context: .
      dockerfile: src/microservices/matches-service/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/microservices/matches-service:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8001:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

  modalities-service:
    build:
      context: .
      dockerfile: src/microservices/modalities-service/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/microservices/modalities-service:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8002:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

  ranking-service:
    build:
      context: .
      dockerfile: src/microservices/ranking-service/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/microservices/ranking-service:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8003:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

  read-model-updater:
    build:
      context: .
      dockerfile: src/microservices/read-model-updater/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/microservices/read-model-updater:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8004:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

  tournaments-service:
    build:
      context: .
      dockerfile: src/microservices/tournaments-service/Dockerfile.dev
    volumes:
      - ./src/shared:/tmp
      - ./src/microservices/tournaments-service:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8005:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      postgres:
        condition: service_healthy

# Frontend Services
  admin-panel:
    build:
      context: .
      dockerfile: src/frontend/admin-panel/Dockerfile
    volumes:
      - ./src/frontend/admin-panel:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      # Keycloak is accessed through the nginx reverse proxy.
      # The browser hits /keycloak/ which nginx forwards to keycloak:8080/keycloak/
      - VITE_KEYCLOAK_URL=http://localhost/keycloak
      - VITE_KEYCLOAK_REALM=${KEYCLOAK_REALM:-taca-ua}
      - VITE_KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-frontend-admin}
    # depends_on:
    #   keycloak:
    #     condition: service_healthy

  public-website:
    build:
      context: .
      dockerfile: src/frontend/public-website/Dockerfile
    volumes:
      - ./src/frontend/public-website:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true


volumes:
  postgres_data:
  minio_data:
  rabbitmq_data:
